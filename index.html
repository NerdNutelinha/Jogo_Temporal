<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundo Temporal - Raquel & Geovany</title>
    <style>
        body {
            margin: 0; padding: 0; overflow: hidden;
            background-color: #fff5f7; font-family: 'Arial', sans-serif;
            touch-action: manipulation;
        }

        #game-stage {
            width: 100vw; height: 100vh;
            position: relative; overflow: hidden;
            display: flex; align-items: flex-end;
        }

        /* CHÃO */
        #floor {
            width: 100%; height: 50px;
            background: #ffb6c1; position: absolute; bottom: 0;
        }

        /* PERSONAGEM */
        #player {
            width: 50px; height: 50px;
            background-color: #ff69b4;
            border-radius: 50% 50% 10px 10px;
            position: absolute; left: 50px; bottom: 50px;
            z-index: 10; transition: bottom 0.1s;
        }

        /* DATAS AO FUNDO */
        .data-bg {
            position: absolute; right: -300px;
            bottom: 200px; font-size: 3rem;
            font-weight: bold; white-space: nowrap;
            opacity: 0.3; user-select: none;
        }

        /* CORAÇÕES QUE SEGUEM */
        .heart-trail {
            position: absolute; font-size: 20px;
            pointer-events: none; animation: fadeUp 1s forwards;
        }

        @keyframes fadeUp {
            to { transform: translateY(-50px); opacity: 0; }
        }

        #ui {
            position: fixed; top: 20px; width: 100%;
            text-align: center; z-index: 100;
        }

        #instructions {
            background: rgba(255, 255, 255, 0.8);
            padding: 10px 20px; border-radius: 20px;
            color: #ff69b4; font-weight: bold;
        }
    </style>
</head>
<body onclick="handleAction()">

    <div id="ui">
        <div id="instructions">❤️ Clique para pular e caminhar na nossa história ❤️</div>
    </div>

    <div id="game-stage">
        <div id="player"></div>
        <div id="floor"></div>
    </div>

    <script>
        const player = document.getElementById('player');
        const stage = document.getElementById('game-stage');
        const instructions = document.getElementById('instructions');

        let isJumping = false;
        let currentStep = 0;
        let heartColor = "#ff69b4";

        const datas = [
            { data: "18/02/2025", cor: "#ffb6c1", msg: "Onde tudo começou..." },
            { data: "20/05/2025", cor: "#ff69b4", msg: "Nossa conexão crescia..." },
            { data: "01/01/2026", cor: "#da70d6", msg: "Um novo ano, um novo nós..." },
            { data: "13/02/2026", cor: "#ff1493", msg: "O início do nosso pra sempre!" },
            { data: "Pule para o Futuro!", cor: "#ff0000", msg: "PRONTO PARA O PRÓXIMO NÍVEL?" }
        ];

        function handleAction() {
            if (isJumping) return;
            
            // PULO
            isJumping = true;
            let pos = 50;
            let up = setInterval(() => {
                if (pos >= 150) {
                    clearInterval(up);
                    let down = setInterval(() => {
                        if (pos <= 50) {
                            clearInterval(down);
                            isJumping = false;
                        }
                        pos -= 5;
                        player.style.bottom = pos + "px";
                    }, 20);
                }
                pos += 5;
                player.style.bottom = pos + "px";
            }, 20);

            // GERA CORAÇÃO NO RASTRO
            createHeart();

            // AVANÇA A DATA
            if (currentStep < datas.length) {
                showNextData();
            } else {
                // REDIRECIONA PARA O VÍDEO NO ÚLTIMO PULO
                window.location.href = "https://www.youtube.com/embed/8GlWCm9wOF0?autoplay=1";
            }
        }

        function createHeart() {
            const h = document.createElement('div');
            h.innerHTML = "❤️";
            h.className = "heart-trail";
            h.style.left = "60px";
            h.style.bottom = "80px";
            h.style.color = heartColor;
            stage.appendChild(h);
            setTimeout(() => h.remove(), 1000);
        }

        function showNextData() {
            const d = datas[currentStep];
            const el = document.createElement('div');
            el.className = "data-bg";
            el.innerText = d.data;
            el.style.color = d.cor;
            stage.appendChild(el);

            heartColor = d.cor; // Muda cor do rastro
            instructions.innerText = d.msg;

            // Animação da data passando
            let x = window.innerWidth;
            let move = setInterval(() => {
                x -= 5;
                el.style.left = x + "px";
                if (x < -500) {
                    clearInterval(move);
                    el.remove();
                }
            }, 10);

            currentStep++;
        }
    </script>
</body>
</html>
